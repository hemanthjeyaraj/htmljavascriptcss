<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculator •  JS</title>
  <style>
    /* ==========================
       BASIC STYLES & VARIABLES
       ========================== */
    :root {
      --bg: #0f1220;
      --panel: #171a2b;
      --panel-2: #1f2340;
      --text: #f5f7ff;
      --muted: #a9b0c7;
      --accent: #8aa2ff;
      --accent-2: #6ce3ff;
      --danger: #ff6b6b;
      --success: #9cff6c;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0; 
      font-family: system-ui, sans-serif;
      background: radial-gradient(1200px 800px at 20% 20%, #131735 0%, #0f1220 55%, #0c0f1a 100%);
      color: var(--text);
      display: grid; place-items: center;
      padding: 24px;
    }

    /* ==========================
       CALCULATOR LAYOUT
       ========================== */
    .calc {
      width: min(420px, 92vw);
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.06);
    }

    /* Fake top bar (like MacOS window controls) */
    .topbar { display: flex; align-items: center; gap: 10px; padding: 14px 16px; background: rgba(255,255,255,.03); }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }
    .title { margin-left: auto; font-size: 12px; color: var(--muted); text-transform: uppercase; }

    /* Display area */
    .display {
      padding: 18px 20px 8px 20px;
      min-height: 120px;
      display: grid; align-content: end; gap: 6px;
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
    }
    .history { color: var(--muted); text-align: right; font-size: 14px; }
    .screen { font-size: clamp(32px, 6vw, 44px); text-align: right; word-break: break-all; }

    /* Keypad layout */
    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 16px; }
    button.key {
      border: none; cursor: pointer; border-radius: 16px; padding: 16px; font-size: 18px; color: var(--text);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      box-shadow: inset 0 -1px 0 rgba(255,255,255,.04), 0 6px 14px rgba(0,0,0,.25);
      transition: transform .05s ease, filter .15s ease;
    }
    button.key:active { transform: translateY(1px) scale(0.995); }
    .op { background: linear-gradient(180deg, rgba(138,162,255,.25), rgba(138,162,255,.12)); }
    .eq { background: linear-gradient(180deg, rgba(108,227,255,.35), rgba(108,227,255,.15)); font-weight: 700; }
    .wide { grid-column: span 2; }
    .danger { background: linear-gradient(180deg, rgba(255,107,107,.30), rgba(255,107,107,.12)); }
    .muted { color: var(--muted); }

    /* Footer */
    .footer { padding: 10px 16px 16px; display:flex; justify-content: space-between; color: var(--muted); font-size: 12px; }
    .chip { padding: 6px 10px; border-radius: 999px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); }
  </style>
</head>
<body>
  <main class="calc">
    <!-- Window-style top bar -->
    <div class="topbar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="title">HTML Calculator</span>
    </div>

    <!-- Display section -->
    <section class="display">
      <div class="history" id="history"></div>
      <div class="screen" id="screen">0</div>
    </section>

    <!-- Calculator keys -->
    <section class="buttons" id="keys">
      <!-- First row -->
      <button class="key danger" data-action="clear">AC</button>
      <button class="key muted" data-action="sign">±</button>
      <button class="key muted" data-action="percent">%</button>
      <button class="key op" data-op="/">÷</button>

      <!-- Digits and operators -->
      <button class="key" data-num="7">7</button>
      <button class="key" data-num="8">8</button>
      <button class="key" data-num="9">9</button>
      <button class="key op" data-op="*">×</button>

      <button class="key" data-num="4">4</button>
      <button class="key" data-num="5">5</button>
      <button class="key" data-num="6">6</button>
      <button class="key op" data-op="-">−</button>

      <button class="key" data-num="1">1</button>
      <button class="key" data-num="2">2</button>
      <button class="key" data-num="3">3</button>
      <button class="key op" data-op="+">+</button>

      <button class="key wide" data-num="0">0</button>
      <button class="key" data-action="dot">.</button>
      <button class="key eq" data-action="equals">=</button>

      <!-- Extra utility keys -->
      <button class="key muted wide" data-action="back">⌫</button>
      <button class="key muted" data-action="copy">Copy</button>
      <button class="key muted" data-action="paste">Paste</button>
    </section>

    <!-- Footer hints -->
    <div class="footer">
      <span class="chip">Keys: 0–9 • + − × ÷ • Enter • Backspace</span>
      <span class="chip" id="status"></span>
    </div>
  </main>

  <script>
    /* ==========================
       APP STATE & REFERENCES
       ========================== */
    const screen = document.getElementById('screen');
    const historyEl = document.getElementById('history');
    const statusEl = document.getElementById('status');
    const keys = document.getElementById('keys');

    // Keeps track of current calculation
    const state = {
      first: null,
      operator: null,
      second: null,
      display: '0',
      overwrite: true, // whether next digit replaces display
      lastPressedEquals: false,
    };

    /* ==========================
       HELPER FUNCTIONS
       ========================== */

    // Format numbers with commas
    const fmt = (n) => {
      if (!isFinite(+n)) return 'Error';
      const [int, dec] = String(n).split('.');
      const intFmt = int.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      return dec ? `${intFmt}.${dec}` : intFmt;
    };

    // Update display and history
    const updateDisplay = () => {
      screen.textContent = state.display;
      const h = [state.first, state.operator, state.second].filter(Boolean).join(' ');
      historyEl.textContent = h;
    };

    // Input digit
    const inputDigit = (d) => {
      if (state.overwrite || state.display === '0') {
        state.display = d;
        state.overwrite = false;
      } else {
        state.display += d;
      }
      state.operator ? state.second = state.display : state.first = state.display;
      updateDisplay();
    };

    // Input decimal point
    const inputDot = () => {
      if (state.overwrite) {
        state.display = '0.';
        state.overwrite = false;
      } else if (!state.display.includes('.')) {
        state.display += '.';
      }
      state.operator ? state.second = state.display : state.first = state.display;
      updateDisplay();
    };

    // Set operator (+, -, *, /)
    const setOperator = (op) => {
      if (state.first === null) state.first = '0';
      // If already has operator + second value, compute first
      if (state.operator && state.second !== null) {
        const result = compute();
        state.first = result;
        state.display = result;
        state.second = null;
      }
      state.operator = op;
      state.overwrite = true;
      updateDisplay();
    };

    // Clear all
    const clearAll = () => {
      state.first = null; state.operator = null; state.second = null; state.display = '0'; state.overwrite = true;
      updateDisplay();
      flashStatus('Cleared');
    };

    // Backspace one character
    const backspace = () => {
      if (state.overwrite) return;
      state.display = state.display.length > 1 ? state.display.slice(0, -1) : '0';
      state.operator ? state.second = state.display : state.first = state.display;
      updateDisplay();
    };

    // Toggle sign (+/-)
    const toggleSign = () => {
      if (state.display === '0') return;
      state.display = state.display.startsWith('-') ? state.display.slice(1) : '-' + state.display;
      state.operator ? state.second = state.display : state.first = state.display;
      updateDisplay();
    };

    // Percent operation
    const percent = () => {
      let v = parseFloat(state.display || '0');
      v = v / 100;
      state.display = String(v);
      state.operator ? state.second = state.display : state.first = state.display;
      updateDisplay();
    };

    // Perform calculation
    const compute = () => {
      const a = parseFloat(state.first || '0');
      const b = parseFloat(state.second || state.first || '0');
      let r = 0;
      switch (state.operator) {
        case '+': r = a + b; break;
        case '-': r = a - b; break;
        case '*': r = a * b; break;
        case '/': r = b === 0 ? NaN : a / b; break;
        default: r = a; break;
      }
      return isFinite(r) ? String(r) : 'Error';
    };

    // Equals button
    const equals = () => {
      if (!state.operator) return;
      if (state.second === null) state.second = state.first; // repeat op
      const result = compute();
      historyEl.textContent = `${state.first} ${state.operator} ${state.second} =`;
      state.display = result;
      state.first = result;
      state.overwrite = true;
      updateDisplay();
    };

    // Small status message
    const flashStatus = (msg) => {
      statusEl.textContent = msg;
      clearTimeout(flashStatus._t);
      flashStatus._t = setTimeout(() => (statusEl.textContent = ''), 1200);
    };

    /* ==========================
       EVENT HANDLERS
       ========================== */

    // Mouse clicks
    keys.addEventListener('click', (e) => {
      const btn = e.target.closest('button.key');
      if (!btn) return;
      const num = btn.dataset.num;
      const op = btn.dataset.op;
      const action = btn.dataset.action;

      if (num) return inputDigit(num);
      if (op) return setOperator(op);

      switch (action) {
        case 'dot': return inputDot();
        case 'equals': return equals();
        case 'clear': return clearAll();
        case 'back': return backspace();
        case 'sign': return toggleSign();
        case 'percent': return percent();
        case 'copy':
          navigator.clipboard?.writeText(screen.textContent).then(() => flashStatus('Copied'));
          return;
        case 'paste':
          navigator.clipboard?.readText().then(t => {
            const v = t.replace(/[^0-9.+\-]/g, '');
            if (!v) return flashStatus('Nothing to paste');
            state.display = v; state.overwrite = false;
            state.operator ? state.second = v : state.first = v;
            updateDisplay();
          });
          return;
      }
    });

    // Keyboard support
    window.addEventListener('keydown', (e) => {
      const { key } = e;
      if (/^\d$/.test(key)) return inputDigit(key);
      if (key === '.') return inputDot();
      if (["+","-","*","/"].includes(key)) return setOperator(key);
      if (key === 'Enter' || key === '=') return equals();
      if (key === 'Backspace') return backspace();
      if (key === '%') return percent();
      if (key === 'Escape') return clearAll();
    });

    // Initialize
    updateDisplay();
  </script>
</body>
</html>
